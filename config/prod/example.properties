[SPARK_CONTEXT]
spark.app.name=MyETLJob-prod
spark.master=yarn
spark.jars=/opt/spark/jars/postgresql-42.2.jar
spark.executor.memory=8g
spark.executor.cores=4
spark.sql.shuffle.partitions=400

[COS]
bucket=s3://my-data-bucket-prod

[DATABASE]
host=prod-db-host
port=5432
dbname=my_database_prod

[SPARK]
env=prod
targetstorage=cos
targetfilepath={bucket}/input/data.csv
loadMethod=full
ispartitioned=true
partitioncolumnlist=country,year

[KAFKA]
insertintokafka=false
