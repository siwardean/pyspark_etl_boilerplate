[SPARK_CONTEXT]
spark.app.name=MyETLJob
spark.master=local[*]
spark.jars=/opt/spark/jars/postgresql-42.2.jar

[COS]
bucket=s3://my-data-bucket

[SPARK]
env=dev
targetstorage=cos
targetfilepath={bucket}/input/data.csv
loadMethod=full
ispartitioned=true
partitioncolumnlist=country,year

[KAFKA]
insertintokafka=false
