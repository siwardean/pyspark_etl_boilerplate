[SPARK_CONTEXT]
spark.app.name=MyETLJob-test
spark.master=local[*]
spark.jars=/opt/spark/jars/postgresql-42.2.jar

[COS]
bucket=s3://my-data-bucket-test

[DATABASE]
host=test-db-host
port=5432
dbname=my_database_test

[SPARK]
env=test
targetstorage=cos
targetfilepath={bucket}/input/data.csv
loadMethod=full
ispartitioned=true
partitioncolumnlist=country,year

[KAFKA]
insertintokafka=false
