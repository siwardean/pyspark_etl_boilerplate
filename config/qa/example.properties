[SPARK_CONTEXT]
spark.app.name=MyETLJob-qa
spark.master=yarn
spark.jars=/opt/spark/jars/postgresql-42.2.jar
spark.executor.memory=4g
spark.executor.cores=2

[COS]
bucket=s3://my-data-bucket-qa

[DATABASE]
host=qa-db-host
port=5432
dbname=my_database_qa

[SPARK]
env=qa
targetstorage=cos
targetfilepath={bucket}/input/data.csv
loadMethod=full
ispartitioned=true
partitioncolumnlist=country,year

[KAFKA]
insertintokafka=false
